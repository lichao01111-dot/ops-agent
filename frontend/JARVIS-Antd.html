<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JARVIS · Enterprise AI Agent — React + Ant Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/antd@5.22.2/dist/reset.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter','Noto Sans SC',sans-serif; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  /* Ant Design overrides */
  .ant-collapse-header { align-items: center !important; }
  .ant-collapse-content-box { padding: 10px 14px !important; }
  .ant-upload-wrapper { display: inline-flex !important; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- dayjs required by antd -->
<script src="https://unpkg.com/dayjs@1.11.13/dayjs.min.js"></script>
<!-- Ant Design UMD -->
<script src="https://unpkg.com/antd@5.22.2/dist/antd.min.js"></script>
<!-- Ant Design Icons -->
<script src="https://unpkg.com/@ant-design/icons@5.5.2/dist/index.umd.min.js"></script>

<!-- Component files -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="antd-login.jsx"></script>
<script type="text/babel" src="antd-sidebar.jsx"></script>
<script type="text/babel" src="antd-chat.jsx"></script>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#f8fafc">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#f8fafc"/>
    <rect x="0" y="0" width="220" height="800" fill="#ffffff"/>
    <rect x="220" y="0" width="980" height="56" fill="#ffffff"/>
    <rect x="240" y="80" width="740" height="56" rx="12" fill="#f0f4ff"/>
    <rect x="240" y="160" width="460" height="80" rx="12" fill="#ffffff"/>
    <rect x="240" y="260" width="560" height="80" rx="12" fill="#1d4ed8" opacity="0.9"/>
    <circle cx="600" cy="420" r="20" fill="#1d4ed8" opacity="0.15"/>
    <text x="600" y="426" text-anchor="middle" fill="#1d4ed8" font-size="14" font-family="monospace" opacity="0.8">JARVIS</text>
  </svg>
</template>

<script type="text/babel">
const { ConfigProvider, Layout, theme: antdTheme, Typography, Button, Space, Breadcrumb, Tag, Avatar, Tooltip, Dropdown, Badge } = antd;
const {
  SettingOutlined, ExportOutlined, BarChartOutlined,
  ThunderboltOutlined, MenuFoldOutlined, MenuUnfoldOutlined
} = icons;
const { Header, Content, Sider } = Layout;
const { Text } = Typography;

// ─── Mock Data ────────────────────────────────────────────────────────────────
const INIT_MESSAGES = [
  {
    id: 'm0', role:'assistant', agentName:'IT运维助手', agentIcon:'💻', agentColor:'#1d4ed8',
    time:'09:14',
    content:'您好！我是 **IT运维助手**，专注于企业IT系统的监控、运维和故障处理。\n\n我可以帮您：\n- 查询服务器、数据库、网络设备状态\n- 分析系统日志和告警事件\n- 生成运维报告和容量规划\n- 执行标准化运维操作流程\n\n请问有什么可以协助您的？'
  },
  {
    id:'m1', role:'user', time:'09:15', userInitial:'Z',
    content:'帮我检查一下当前生产环境所有数据库服务的运行状态，重点关注连接池使用情况。',
    files:[{ name:'db-config.xlsx', size:'42 KB', type:'excel' }]
  },
  {
    id:'m2', role:'assistant', agentName:'IT运维助手', agentIcon:'💻', agentColor:'#1d4ed8',
    time:'09:15',
    content:'收到，正在扫描所有生产数据库节点...',
    toolCalls:[
      {
        tool:'database_query', description:'查询数据库集群状态', status:'success',
        input:{ target:'prod-cluster', scope:['mysql-primary','mysql-replica-01','redis-01','mongo-shard'], metrics:['connection_pool','latency','throughput'] },
        output:{ mysql_primary:{ status:'HEALTHY', connections:'87/200', latency:'2.3ms' }, 'mysql-replica-01':{ status:'HEALTHY', connections:'43/150', latency:'1.8ms' }, 'redis-01':{ status:'HEALTHY', hit_rate:'94.2%', memory:'68%' }, 'mongo-shard':{ status:'WARNING', connections:'148/150', latency:'12.4ms' } }
      },
      {
        tool:'api_call', description:'拉取 MongoDB 慢查询日志', status:'success',
        input:{ service:'mongo-shard', endpoint:'/api/metrics/slow_queries', since:'2h' },
        output:'找到 23 条慢查询记录，主要集中在 transactions 集合，平均耗时 340ms。'
      }
    ]
  },
  {
    id:'m3', role:'assistant', agentName:'IT运维助手', agentIcon:'💻', agentColor:'#1d4ed8',
    time:'09:16',
    content:'扫描完成，以下是数据库状态汇总：\n\n### ✅ 正常服务\n- **MySQL Primary** — 连接池 87/200（43%），延迟 2.3ms，状态良好\n- **MySQL Replica-01** — 连接池 43/150（29%），延迟 1.8ms，同步正常\n- **Redis-01** — 命中率 94.2%，内存使用 68%，运行稳定\n\n### ⚠️ 需关注\n- **MongoDB Shard** — 连接池 **148/150（98.7%）**，存在连接池耗尽风险！检测到 23 条慢查询，主要为 `transactions` 集合的聚合操作（平均 340ms）\n\n**建议立即处理：**\n- 将 MongoDB 连接池上限从 150 扩展至 300\n- 对 `transactions` 集合添加复合索引\n- 考虑将部分聚合查询改为异步任务'
  }
];

let msgIdCounter = 20;
const newId = () => `m${msgIdCounter++}`;

function simulateStream(text, onChunk, onDone) {
  let i = 0;
  const iv = setInterval(() => {
    if (i >= text.length) { clearInterval(iv); onDone(); return; }
    i = Math.min(i + Math.floor(Math.random()*4)+1, text.length);
    onChunk(text.slice(0, i));
  }, 18);
  return iv;
}

function getResponse(agent, userText) {
  const resp = {
    'it-ops': { toolCalls:[{ tool:'system_query', description:'查询系统资源状态', status:'success', input:{ query:userText.slice(0,50), scope:'production' }, output:{ records:Math.floor(Math.random()*100)+10, status:'ok' } }], text:`已处理您的请求。\n\n系统查询完成，检索到相关记录。根据当前分析：\n\n- 所有核心服务运行正常\n- 资源使用率处于健康范围\n- 未发现严重告警事件\n\n如需进一步操作或详细报告，请告知。` },
    'risk':    { toolCalls:[{ tool:'risk_check', description:'执行风险评估模型', status:'success', input:{ scenario:userText.slice(0,40), model:'v3.2' }, output:{ risk_level:'LOW', score:0.12 } }], text:`风险评估完成。\n\n**评估结论：低风险（评分 0.12/1.0）**\n\n- 访问模式：符合正常业务规律\n- 交易金额：在风控阈值范围内\n\n建议：**正常放行**，保持常规监控频率。` },
    'finance': { toolCalls:[{ tool:'report_generate', description:'生成财务分析', status:'success', input:{ period:'current_quarter' }, output:{ revenue:'¥2.4B', growth:'+12.3%' } }], text:`财务分析完成。\n\n**本季度核心指标：**\n- **营业收入**：¥24亿（同比 +12.3%）\n- **净利润率**：34.7%\n\n整体经营趋势向好，建议关注利率变动影响。` },
    'service': { toolCalls:[{ tool:'user_lookup', description:'查询客户信息', status:'success', input:{ query:userText.slice(0,30) }, output:{ level:'VIP', satisfaction:'4.8/5' } }], text:`已为您查询相关信息。\n\n**客户档案：**\n- 客户等级：VIP白金卡\n- 满意度：4.8/5.0\n- 待处理工单：0\n\n如需办理具体业务，请告知。` },
  };
  return resp[agent.id] || resp['it-ops'];
}

// ─── Top Header ───────────────────────────────────────────────────────────────
const TopHeader = ({ currentAgent, currentConv, collapsed, onCollapse }) => (
  <Header style={{ background:'#fff', borderBottom:'1px solid #f0f0f0', padding:'0 20px 0 0', display:'flex', alignItems:'center', height:56, gap:0, lineHeight:'normal' }}>
    {/* Collapse toggle */}
    <div style={{ width: collapsed?64:260, display:'flex', alignItems:'center', paddingLeft:20, flexShrink:0, transition:'width 0.2s' }}>
      {collapsed && (
        <Button type="text" icon={<MenuUnfoldOutlined/>} onClick={()=>onCollapse(false)} style={{ color:'#94a3b8' }}/>
      )}
    </div>

    {/* Agent badge */}
    <div style={{ flex:1, display:'flex', alignItems:'center', gap:10, paddingLeft:16 }}>
      <div style={{
        display:'flex', alignItems:'center', gap:8, padding:'4px 12px',
        background:`${currentAgent.color}0f`, border:`1px solid ${currentAgent.color}25`, borderRadius:20
      }}>
        <span style={{ fontSize:14 }}>{currentAgent.icon}</span>
        <Text style={{ fontSize:12, fontWeight:600, color:currentAgent.color }}>{currentAgent.name}</Text>
        <Badge color="#10b981" dot/>
        <Text type="secondary" style={{ fontSize:10 }}>在线</Text>
      </div>
      {currentConv && (
        <Text type="secondary" style={{ fontSize:11 }}>{currentConv.title}</Text>
      )}
    </div>

    {/* Actions */}
    <Space size={4}>
      <Tooltip title="数据分析"><Button type="text" icon={<BarChartOutlined/>} style={{ color:'#94a3b8' }}/></Tooltip>
      <Tooltip title="设置"><Button type="text" icon={<SettingOutlined/>} style={{ color:'#94a3b8' }}/></Tooltip>
      <Button icon={<ExportOutlined/>} style={{ borderRadius:8, fontSize:12 }}>导出</Button>
    </Space>
  </Header>
);

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "colorScheme": "slate",
    "density": "comfortable",
    "fontSize": 14,
    "showTimestamp": true
  }/*EDITMODE-END*/;

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const colorTokens = {
    blue:   { colorPrimary:'#1d4ed8', colorLink:'#1d4ed8' },
    indigo: { colorPrimary:'#4f46e5', colorLink:'#4f46e5' },
    teal:   { colorPrimary:'#0d9488', colorLink:'#0d9488' },
    slate:  { colorPrimary:'#334155', colorLink:'#334155' },
  };
  const token = colorTokens[tweaks.colorScheme] || colorTokens.blue;

  const [page, setPage] = React.useState('login');
  const [user, setUser] = React.useState(null);
  const [currentAgent, setCurrentAgent] = React.useState(ANTD_AGENTS[0]);
  const [currentConv, setCurrentConv] = React.useState(ANTD_CONVERSATIONS[0]);
  const [messages, setMessages] = React.useState(INIT_MESSAGES);
  const [isThinking, setIsThinking] = React.useState(false);
  const [streamingId, setStreamingId] = React.useState(null);
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  const messagesEndRef = React.useRef(null);

  React.useEffect(() => {
    const el = messagesEndRef.current;
    if (!el) return;
    const parent = el.parentElement;
    if (parent) parent.scrollTop = parent.scrollHeight;
  }, [messages, isThinking]);

  const handleLogin = (userData) => { setUser(userData); setPage('chat'); };

  const handleSend = ({ text, files }) => {
    if (!text && files.length===0) return;
    const userMsg = {
      id:newId(), role:'user',
      time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
      content:text, files:files.length>0?files:undefined,
      userInitial:user?.username?.charAt(0).toUpperCase()||'U'
    };
    setMessages(p=>[...p,userMsg]);
    setIsThinking(true);
    setTimeout(() => {
      setIsThinking(false);
      const resp = getResponse(currentAgent, text||'文件分析');
      const aid = newId();
      const aiMsg = {
        id:aid, role:'assistant',
        agentName:currentAgent.name, agentIcon:currentAgent.icon, agentColor:currentAgent.color,
        time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
        content:'', toolCalls:resp.toolCalls
      };
      setMessages(p=>[...p,aiMsg]);
      setStreamingId(aid);
      simulateStream(resp.text, (partial)=>{
        setMessages(p=>p.map(m=>m.id===aid?{...m,content:partial}:m));
      }, ()=>setStreamingId(null));
    }, 900+Math.random()*1000);
  };

  const handleNewChat = () => {
    setMessages([{
      id:newId(), role:'assistant',
      agentName:currentAgent.name, agentIcon:currentAgent.icon, agentColor:currentAgent.color,
      time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
      content:`您好！我是 **${currentAgent.name}**。\n\n请告诉我您的需求，我来为您处理。`
    }]);
  };

  const handleAgentChange = (agent) => {
    setCurrentAgent(agent);
    setMessages([{
      id:newId(), role:'assistant',
      agentName:agent.name, agentIcon:agent.icon, agentColor:agent.color,
      time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
      content:`已切换至 **${agent.name}**（${agent.role}）。\n\n您好，有什么可以协助您的？`
    }]);
  };

  return (
    <ConfigProvider
      theme={{
        token: {
          ...token,
          borderRadius: 8,
          fontFamily: "'Inter','Noto Sans SC',sans-serif",
          fontSize: tweaks.fontSize,
        },
        components: {
          Layout: { headerBg:'#fff', siderBg:'#fff', bodyBg:'#f8fafc' },
          Collapse: { headerBg:'#fafafa', contentBg:'#fafafa' },
        }
      }}
    >
      <div style={{ width:'100%', height:'100%', position:'relative' }}>
        {page === 'login' && <AntdLoginPage onLogin={handleLogin}/>}

        {page === 'chat' && (
          <Layout style={{ height:'100%' }}>
            <AntdSidebar
              currentAgent={currentAgent}
              onAgentChange={handleAgentChange}
              currentConv={currentConv}
              onConvChange={setCurrentConv}
              onNewChat={handleNewChat}
              user={user}
              collapsed={sidebarCollapsed}
              onCollapse={setSidebarCollapsed}
            />
            <Layout style={{ height:'100%' }}>
              <TopHeader
                currentAgent={currentAgent}
                currentConv={currentConv}
                collapsed={sidebarCollapsed}
                onCollapse={setSidebarCollapsed}
              />
              <Content style={{ display:'flex', flexDirection:'column', overflow:'hidden', height:'calc(100% - 56px)' }}>
                <AntdChatMessages
                  messages={messages}
                  isThinking={isThinking}
                  currentAgent={currentAgent}
                  messagesEndRef={messagesEndRef}
                  streamingId={streamingId}
                  userInitial={user?.username?.charAt(0).toUpperCase()||'U'}
                />
                <AntdChatInput
                  onSend={handleSend}
                  disabled={isThinking||streamingId!==null}
                  currentAgent={currentAgent}
                />
              </Content>
            </Layout>
          </Layout>
        )}

        {/* Tweaks Panel */}
        <TweaksPanel>
          <TweakSection title="主色调 / Color">
            <TweakRadio id="colorScheme" label="品牌色" value={tweaks.colorScheme} onChange={v=>setTweak('colorScheme',v)}
              options={[{value:'blue',label:'蓝'},{value:'indigo',label:'靛'},{value:'teal',label:'青'},{value:'slate',label:'石板'}]}
            />
          </TweakSection>
          <TweakSection title="排版 / Typography">
            <TweakSlider id="fontSize" label="字号" min={12} max={16} step={1} value={tweaks.fontSize} onChange={v=>setTweak('fontSize',v)}/>
          </TweakSection>
          <TweakSection title="布局 / Layout">
            <TweakRadio id="density" label="密度" value={tweaks.density} onChange={v=>setTweak('density',v)}
              options={[{value:'compact',label:'紧凑'},{value:'comfortable',label:'舒适'}]}
            />
            <TweakToggle id="showTimestamp" label="显示时间" value={tweaks.showTimestamp} onChange={v=>setTweak('showTimestamp',v)}/>
          </TweakSection>
          <TweakSection title="演示 / Demo">
            <TweakButton label="← 返回登录页" onClick={()=>setPage('login')}/>
            <TweakButton label="→ 进入主界面" onClick={()=>{setUser({username:'admin'});setMessages(INIT_MESSAGES);setPage('chat');}}/>
          </TweakSection>
        </TweaksPanel>
      </div>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
