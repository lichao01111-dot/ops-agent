services:
  # ===== PostgreSQL + pgvector =====
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ops_agent
      POSTGRES_USER: ops_agent
      POSTGRES_PASSWORD: ops_agent
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops_agent -d ops_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== OpsAgent API =====
  ops-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      KNOWLEDGE_PG_DSN: postgresql://ops_agent:ops_agent@postgres:5432/ops_agent
      LANGFUSE_HOST: http://host.docker.internal:3000
    volumes:
      - ./data:/app/data
      - ~/.kube:/root/.kube:ro  # K8s config (只读)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== Redis (会话/缓存) =====
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ===== Web UI (开发模式) =====
  # web-ui:
  #   build:
  #     context: ./web_ui
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - REACT_APP_API_URL=http://localhost:8000
  #   depends_on:
  #     - ops-agent

volumes:
  postgres-data:
  redis-data:
